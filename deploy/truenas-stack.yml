# ════════════════════════════════════════════════════════════════════════
# her — TrueNAS Apps stack
#
# Drop this into TrueNAS → Apps → Custom App.
# Replace every <PLACEHOLDER> with a real value before deploying.
#
# Generate secrets with:
#   openssl rand -base64 32          # POSTGRES_PASSWORD, INTERNAL_API_SECRET
#   openssl rand -hex 32             # JWT_SECRET, ENCRYPTION_KEY
#   pnpm dlx web-push generate-vapid-keys   # VAPID_*
#
# After first deploy:
#   1. Reconnect Google + Microsoft OAuth (redirects now point at her.phnet.me)
#   2. Restore the postgres dump from your dev machine
#   3. Copy data/attachments/ contents into the attachments volume
# ════════════════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: her
      POSTGRES_PASSWORD: <POSTGRES_PASSWORD>
      POSTGRES_DB: her
      TZ: America/Chicago
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U her -d her']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: ghcr.io/80willpower08/her-api:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://her:<POSTGRES_PASSWORD>@postgres:5432/her
      REDIS_URL: redis://redis:6379
      TZ: America/Chicago
      JWT_SECRET: <JWT_SECRET>
      ADMIN_USERNAME: <YOUR_LOGIN_USERNAME>
      # CRITICAL: TrueNAS Apps' YAML pipeline mangles `$`-characters in env
      # values regardless of escaping (`$$`, `\$`, single-quotes, etc. all
      # fail). Bcrypt hashes contain four `$` signs, so use the base64 form
      # below instead — the api decodes it at startup.
      #
      # Generate the value with:
      #   pnpm hash-password 'your-password'             # gives $2b$12$...
      #   echo -n '$2b$12$...' | base64                  # gives ADMIN_PASSWORD_HASH_B64
      ADMIN_PASSWORD_HASH_B64: <ADMIN_PASSWORD_HASH_B64>
      API_PORT: '3001'
      NODE_ENV: production
      PUBLIC_ORIGIN: https://her.phnet.me
      INTERNAL_API_SECRET: <INTERNAL_API_SECRET>
      ENCRYPTION_KEY: <ENCRYPTION_KEY>
      GOOGLE_OAUTH_CLIENT_ID: <GOOGLE_OAUTH_CLIENT_ID>
      GOOGLE_OAUTH_CLIENT_SECRET: <GOOGLE_OAUTH_CLIENT_SECRET>
      MS_OAUTH_CLIENT_ID: <MS_OAUTH_CLIENT_ID>
      MS_OAUTH_CLIENT_SECRET: <MS_OAUTH_CLIENT_SECRET>
      ANTHROPIC_API_KEY: <ANTHROPIC_API_KEY>
      ANTHROPIC_MODEL: claude-opus-4-7
      DAILY_AGENT_CRON: 0 8 * * *
      DAILY_AGENT_TZ: America/Chicago
      ATTACHMENTS_DIR: /data/attachments
      VAPID_PUBLIC_KEY: <VAPID_PUBLIC_KEY>
      VAPID_PRIVATE_KEY: <VAPID_PRIVATE_KEY>
      VAPID_SUBJECT: 'mailto:<YOUR_EMAIL>'
      NTFY_URL: http://ntfy/
      NTFY_TOPIC: her-notifications-<RANDOM_SUFFIX>
      NTFY_BASE_URL: https://her.phnet.me/ntfy
    volumes:
      - attachments:/data/attachments

  worker:
    image: ghcr.io/80willpower08/her-worker:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://her:<POSTGRES_PASSWORD>@postgres:5432/her
      REDIS_URL: redis://redis:6379
      TZ: America/Chicago
      API_INTERNAL_URL: http://api:3001
      INTERNAL_API_SECRET: <INTERNAL_API_SECRET>
      DAILY_AGENT_CRON: 0 8 * * *
      DAILY_AGENT_TZ: America/Chicago
      NODE_ENV: production

  agent:
    image: ghcr.io/80willpower08/her-agent:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://her:<POSTGRES_PASSWORD>@postgres:5432/her
      REDIS_URL: redis://redis:6379
      TZ: America/Chicago
      API_INTERNAL_URL: http://api:3001
      INTERNAL_API_SECRET: <INTERNAL_API_SECRET>
      DAILY_AGENT_TZ: America/Chicago
      NODE_ENV: production
    volumes:
      # Persistent HOME for claude. The image sets HOME=/data/home so this
      # one mount preserves both ~/.claude/ (state) and ~/.claude.json
      # (workspace config) across container recreates. After first deploy,
      # run `docker exec -it <agent> claude` and use /login to authorize.
      - claude-home:/data

  web:
    image: ghcr.io/80willpower08/her-web:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - api
    environment:
      TZ: America/Chicago
      VITE_API_URL: https://her.phnet.me
      VITE_VAPID_PUBLIC_KEY: <VAPID_PUBLIC_KEY>

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - '8080:8080'
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile

  ntfy:
    image: binwiederhier/ntfy:latest
    restart: unless-stopped
    command: serve
    volumes:
      - ntfy-data:/var/cache/ntfy
      - ntfy-config:/etc/ntfy

volumes:
  postgres-data: {}
  attachments: {}
  caddy-data: {}
  caddy-config: {}
  ntfy-data: {}
  ntfy-config: {}
  claude-home: {}

configs:
  # Inlined Caddyfile — defines how Caddy routes requests on :8080.
  # Cloudflare Tunnel terminates TLS upstream and forwards HTTP here.
  caddyfile:
    content: |
      :8080 {
        handle /api/* {
          reverse_proxy api:3001
        }

        handle /healthz {
          reverse_proxy api:3001
        }

        handle /ntfy/* {
          uri strip_prefix /ntfy
          reverse_proxy ntfy:80
        }

        handle {
          reverse_proxy web:5173
        }

        encode gzip

        log {
          output stdout
          format console
        }
      }
