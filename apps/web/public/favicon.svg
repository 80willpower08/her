<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="her">
  <!-- Background: full bleed Night City Cabinet navy. Rounded so adaptive
       icon masking (Android) crops cleanly into circles or squircles. -->
  <rect width="48" height="48" rx="10" fill="#0f172a"/>
  <!-- Lowercase 'h' wordmark, stroked. Sized for "safe zone" within
       maskable crop (Android adaptive icons clip to ~80% center). -->
  <g stroke="#f8fafc" stroke-width="4" stroke-linecap="round" fill="none">
    <line x1="14" y1="10" x2="14" y2="38"/>
    <path d="M14 24 Q14 18 20 18 Q26 18 26 24 L26 38"/>
  </g>
  <!-- Single accent dot — "her is present / listening". -->
  <circle cx="34" cy="14" r="3" fill="#f59e0b"/>
</svg>
