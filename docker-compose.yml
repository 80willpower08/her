name: time-keeper

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./packages/shared/src:/app/packages/shared/src
      # Project attachments — originals stored on the host so they survive
      # container rebuilds. Bind-mount the data directory.
      - ./data/attachments:/data/attachments
    networks: [internal]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY}
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./apps/web/index.html:/app/apps/web/index.html
      - ./packages/shared/src:/app/packages/shared/src
    networks: [internal]

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./apps/worker/src:/app/apps/worker/src
    networks: [internal]

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Image sets HOME=/data/home; in dev we override back to /root so the
      # existing host bind-mounts of ~/.claude/ and ~/.claude.json continue
      # to work at their conventional locations.
      HOME: /root
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./apps/agent/src:/app/apps/agent/src
      # Subscription OAuth credentials from `claude /login` on the host.
      # Mount RW because Claude updates session metadata at runtime.
      - ${CLAUDE_CREDENTIALS_DIR:-~/.claude}:/root/.claude
      - ${CLAUDE_CONFIG_FILE:-~/.claude.json}:/root/.claude.json
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web
    networks: [internal]

  ntfy:
    image: binwiederhier/ntfy:latest
    command: serve
    restart: unless-stopped
    environment:
      NTFY_BASE_URL: http://localhost:8081
      NTFY_LISTEN_HTTP: ":80"
      NTFY_BEHIND_PROXY: "true"
      NTFY_AUTH_DEFAULT_ACCESS: deny-all
    ports:
      - "8081:80"
    volumes:
      - ntfy-cache:/var/cache/ntfy
      - ntfy-data:/var/lib/ntfy
    networks: [internal]

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
  ntfy-cache:
  ntfy-data:

networks:
  internal:
    driver: bridge
